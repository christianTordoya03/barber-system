<!-- Botón Flotante Global de Tema (Sol/Luna) -->
<button 
  (click)="themeService.toggleTheme()" 
  class="fixed top-4 right-4 z-[9999] p-2.5 rounded-full bg-white dark:bg-zinc-800 text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white shadow-lg border border-zinc-200 dark:border-zinc-700 transition-all hover:scale-110 active:scale-95"
  title="Cambiar Tema"
>
  @if (themeService.theme() === 'light') {
    <!-- Ícono de Luna (Para cambiar a Oscuro) -->
    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
  } @else {
    <!-- Ícono de Sol (Para cambiar a Claro) -->
    <svg class="h-5 w-5 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
  }
</button>
