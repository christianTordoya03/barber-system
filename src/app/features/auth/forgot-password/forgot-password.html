<div class="min-h-screen bg-black flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans selection:bg-blue-500 selection:text-white">
  
  <div class="sm:mx-auto sm:w-full sm:max-w-md flex flex-col items-center">
    <img class="mx-auto h-24 w-auto object-contain" src="logo-marina305.png" alt="Marina 305 Barber Shop">
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-[#111111] py-8 px-6 shadow-2xl sm:rounded-3xl sm:px-10 border border-zinc-800 relative overflow-hidden">
      
      <!-- La línea clásica de barbería -->
      <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-red-600 via-gray-200 to-blue-600"></div>

      <!-- Botón de retroceder con hover azul -->
      <a routerLink="/login" class="absolute top-6 left-6 text-zinc-400 hover:text-blue-400 transition-colors cursor-pointer flex items-center text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        Volver
      </a>

      <div class="mt-6 mb-8 text-center mt-8">
        <h2 class="text-2xl font-semibold tracking-tight text-white">Recuperar Acceso</h2>
        <p class="text-sm text-zinc-400 mt-1">Te enviaremos un enlace para restablecer tu contraseña</p>
      </div>

      @if (isSent()) {
        <div class="rounded-xl bg-green-500/10 p-6 border border-green-500/20 text-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-green-400 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          <p class="text-sm font-medium text-green-400">¡Enlace enviado!</p>
          <p class="text-sm text-zinc-400 mt-2">Revisa tu bandeja de entrada o la carpeta de spam.</p>
        </div>
      } @else {
        <form class="space-y-6" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
          <div>
            <label class="block text-sm font-medium text-zinc-300">Correo electrónico registrado</label>
            <div class="mt-2">
              <input type="email" formControlName="email" placeholder="correo@ejemplo.com" class="block w-full rounded-xl border-0 bg-zinc-900 py-3.5 px-4 text-white shadow-sm ring-1 ring-inset ring-zinc-800 placeholder:text-zinc-600 focus:ring-2 focus:ring-inset focus:ring-blue-500 sm:text-sm transition-all duration-200">
            </div>
          </div>

          <button type="submit" [disabled]="isLoading()" class="flex w-full justify-center rounded-xl bg-white px-3 py-3.5 text-sm font-bold text-black shadow-sm hover:bg-zinc-200 transition-all duration-200 disabled:opacity-70">
            @if (isLoading()) { Enviando... } @else { Enviar enlace }
          </button>
        </form>
      }
    </div>
  </div>
</div>
