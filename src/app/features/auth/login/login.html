<div class="min-h-screen bg-zinc-50 dark:bg-black flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans selection:bg-blue-500 selection:text-white transition-colors duration-300">
  
  <div class="sm:mx-auto sm:w-full sm:max-w-md flex flex-col items-center">
    @if (isTenantLoading()) {
      <div class="w-28 h-28 bg-zinc-200 dark:bg-zinc-900 animate-pulse drop-shadow-xl rounded-2xl mb-6"></div>
    } @else {
      <img 
        [src]="supabase.tenant()?.logo_url || '/logo-aureum.png'" 
        [alt]="supabase.tenant()?.name || 'Aureum Logic'" 
        class="w-28 h-28 object-contain mx-auto mb-6 drop-shadow-xl rounded-2xl animate-fade-in"
      >
    }
  </div>
  
  <div class="mt-4 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white dark:bg-[#111111] py-8 px-6 shadow-xl dark:shadow-2xl sm:rounded-3xl sm:px-10 border border-zinc-200 dark:border-zinc-800 relative overflow-hidden transition-colors duration-300">
             
      <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-red-600 via-gray-200 to-blue-600"></div>
             
      <div class="mb-8 text-center mt-2">
        @if (isTenantLoading()) {
          <div class="h-8 w-48 bg-zinc-200 dark:bg-zinc-900 animate-pulse rounded-lg mx-auto mb-3"></div>
          <div class="h-4 w-64 bg-zinc-200 dark:bg-zinc-900 animate-pulse rounded-md mx-auto"></div>
        } @else {
          <h2 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-white animate-fade-in">Iniciar Sesión</h2>
          <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1 animate-fade-in">Ingresa a tu cuenta de {{ supabase.tenant()?.name || 'Aureum Logic' }}</p>
        }
      </div>
      
      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                 
        <div>
          <label for="identificador" class="block text-sm font-medium text-zinc-700 dark:text-zinc-300">Número de Celular</label>
          <div class="mt-2">
            <input id="identificador" type="text" formControlName="identificador" autocomplete="username" placeholder="Ej: 999888777"
              class="block w-full rounded-xl border-0 bg-zinc-100 dark:bg-zinc-900 py-3.5 px-4 text-zinc-900 dark:text-white shadow-sm ring-1 ring-inset ring-zinc-300 dark:ring-zinc-800 placeholder:text-zinc-500 focus:ring-2 focus:ring-inset focus:ring-blue-500 sm:text-sm">
          </div>
        </div>
        
        <div>
          <label for="password" class="block text-sm font-medium text-zinc-700 dark:text-zinc-300">Contraseña</label>
          <div class="mt-2 relative">
            <input id="password" [type]="showPassword() ? 'text' : 'password'" formControlName="password" autocomplete="current-password" placeholder="••••••••"
              class="block w-full rounded-xl border-0 bg-zinc-100 dark:bg-zinc-900 py-3.5 pl-4 pr-12 text-zinc-900 dark:text-white shadow-sm ring-1 ring-inset ring-zinc-300 dark:ring-zinc-800 placeholder:text-zinc-500 focus:ring-2 focus:ring-inset focus:ring-blue-500 sm:text-sm">
            <button type="button" (click)="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-zinc-400 hover:text-zinc-600 transition-colors">
              <svg *ngIf="showPassword()" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.29 3.29m0 0a10.05 10.05 0 015.71-1.581c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0l-3.29-3.29" /></svg>
              <svg *ngIf="!showPassword()" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z" /></svg>
            </button>
          </div>
        </div>
        
        <div>
          <button type="submit" [disabled]="isLoading()"
            class="flex w-full justify-center rounded-xl bg-zinc-900 dark:bg-white px-3 py-3.5 text-sm font-bold text-white dark:text-black shadow-sm hover:bg-zinc-800 transition-all disabled:opacity-70 disabled:cursor-not-allowed">
            {{ isLoading() ? 'Ingresando...' : 'Iniciar Sesión' }}
          </button>
        </div>
      </form>
             
      <p class="mt-8 text-center text-sm text-zinc-600 dark:text-zinc-400">
         ¿No tienes una cuenta? <a routerLink="/register" class="font-medium text-blue-600 dark:text-white hover:underline cursor-pointer">Regístrate aquí</a>
      </p>
    </div>
  </div>
</div>
