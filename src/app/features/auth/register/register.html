<div
  class="min-h-screen bg-black flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans selection:bg-blue-500 selection:text-white">

  <div class="sm:mx-auto sm:w-full sm:max-w-md flex flex-col items-center">
    <img class="mx-auto h-24 w-auto object-contain" src="logo-marina305.png" alt="Marina 305 Barber Shop">
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div
      class="bg-[#111111] py-8 px-6 shadow-2xl sm:rounded-3xl sm:px-10 border border-zinc-800 relative overflow-hidden">

      <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-red-600 via-gray-200 to-blue-600"></div>

      <div class="mb-8 text-center mt-2">
        <h2 class="text-2xl font-semibold tracking-tight text-white">Crear Cuenta</h2>
        <p class="text-sm text-zinc-400 mt-1">Únete a nuestra plataforma</p>
      </div>

      @if (successMessage()) {
      <div class="mb-6 rounded-xl bg-green-500/10 p-4 border border-green-500/20">
        <p class="text-sm font-medium text-green-400 text-center">{{ successMessage() }}</p>
        <button routerLink="/login"
          class="mt-4 w-full text-center text-sm font-medium text-white hover:text-green-300 transition-colors">Volver
          al Login</button>
      </div>
      } @else {
      <form class="space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <div>
          <label class="block text-sm font-medium text-zinc-300">Nombre Completo</label>
          <div class="mt-2">
            <input type="text" formControlName="fullName" placeholder="Ej. Juan Pérez"
              class="block w-full rounded-xl border-0 bg-zinc-900 py-3.5 px-4 text-white shadow-sm ring-1 ring-inset ring-zinc-800 placeholder:text-zinc-600 focus:ring-2 focus:ring-inset focus:ring-blue-500 sm:text-sm transition-all duration-200">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-300">Teléfono / WhatsApp</label>
          <div class="mt-2">
            <input type="tel" formControlName="telefono" placeholder="Ej. 999 999 999"
              class="block w-full rounded-xl border-0 bg-zinc-900 py-3.5 px-4 text-white shadow-sm ring-1 ring-inset ring-zinc-800 placeholder:text-zinc-600 focus:ring-2 focus:ring-inset focus:ring-blue-500 sm:text-sm transition-all duration-200">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-300">Fecha de Nacimiento (Cumpleaños)</label>
          <div class="mt-2">
            <input #fNac type="date" formControlName="fechaNacimiento" (click)="fNac.showPicker()"
              class="block w-full rounded-xl border-0 bg-zinc-900 py-3.5 px-4 text-white shadow-sm ring-1 ring-inset ring-zinc-800 placeholder:text-zinc-600 focus:ring-2 focus:ring-inset focus:ring-blue-500 sm:text-sm transition-all duration-200 cursor-pointer">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-300">Correo electrónico</label>
          <div class="mt-2">
            <input type="email" formControlName="email" placeholder="correo@ejemplo.com"
              class="block w-full rounded-xl border-0 bg-zinc-900 py-3.5 px-4 text-white shadow-sm ring-1 ring-inset ring-zinc-800 placeholder:text-zinc-600 focus:ring-2 focus:ring-inset focus:ring-blue-500 sm:text-sm transition-all duration-200">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-300">Contraseña (Mínimo 6 caracteres)</label>
          <div class="mt-2 relative">
            <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="••••••••"
              class="block w-full rounded-xl border-0 bg-zinc-900 py-3.5 pl-4 pr-12 text-white shadow-sm ring-1 ring-inset ring-zinc-800 placeholder:text-zinc-600 focus:ring-2 focus:ring-inset focus:ring-blue-500 sm:text-sm transition-all duration-200">
            <button type="button" (click)="togglePassword()"
              class="absolute inset-y-0 right-0 flex items-center pr-4 text-zinc-500 hover:text-zinc-300 transition-colors">
              @if (showPassword()) {
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
              </svg>
              } @else {
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z" />
              </svg>
              }
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading()"
          class="flex w-full justify-center rounded-xl bg-white px-3 py-3.5 text-sm font-bold text-black shadow-sm hover:bg-zinc-200 transition-all duration-200 disabled:opacity-70">
          @if (isLoading()) { Cargando... } @else { Registrarse }
        </button>
      </form>
      }

      <p class="mt-8 text-center text-sm text-zinc-400">
        ¿Ya tienes cuenta? <a routerLink="/login"
          class="font-medium text-white hover:text-blue-400 cursor-pointer transition-colors">Inicia sesión</a>
      </p>
    </div>
  </div>
</div>
