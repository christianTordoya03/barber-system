<div class="min-h-screen bg-black flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans selection:bg-blue-500 selection:text-white">
  
  <div class="sm:mx-auto sm:w-full sm:max-w-md flex flex-col items-center">
    <img class="mx-auto h-24 w-auto object-contain" src="logo-marina305.png" alt="Marina 305 Barber Shop">
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md animate-fade-in-up">
    <div class="bg-[#111111] py-8 px-6 shadow-2xl sm:rounded-3xl sm:px-10 border border-zinc-800 relative overflow-hidden">
      
      <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-red-600 via-gray-200 to-blue-600"></div>

      <div class="mb-8 text-center mt-2">
        <h2 class="text-2xl font-semibold tracking-tight text-white">Nueva Contraseña</h2>
        <p class="text-sm text-zinc-400 mt-1">Ingresa tu nueva clave de acceso</p>
      </div>

      @if (successMessage()) {
        <div class="rounded-xl bg-green-500/10 p-6 border border-green-500/20 text-center">
          <svg class="h-12 w-12 text-green-400 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          <p class="text-sm font-medium text-green-400">{{ successMessage() }}</p>
          <p class="text-xs text-zinc-400 mt-2">Redirigiendo...</p>
        </div>
      } @else {
        <form class="space-y-6" [formGroup]="updateForm" (ngSubmit)="onSubmit()">
          <div>
            <label class="block text-sm font-medium text-zinc-300">Nueva Contraseña</label>
            <div class="mt-2">
              <input type="password" formControlName="password" placeholder="••••••••" class="block w-full rounded-xl border-0 bg-zinc-900 py-3.5 px-4 text-white shadow-sm ring-1 ring-inset ring-zinc-800 focus:ring-2 focus:ring-inset focus:ring-blue-500 sm:text-sm transition-all duration-200">
            </div>
          </div>

          <button type="submit" [disabled]="isLoading()" class="flex w-full justify-center rounded-xl bg-gradient-to-r from-blue-600 to-blue-500 px-3 py-3.5 text-sm font-bold text-white shadow-lg shadow-blue-500/30 hover:from-blue-500 hover:to-blue-400 transition-all duration-200 disabled:opacity-70 disabled:cursor-not-allowed">
            @if (isLoading()) { Actualizando... } @else { Guardar Contraseña }
          </button>
        </form>
      }
    </div>
  </div>
</div>
