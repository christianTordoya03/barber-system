<div
  class="fixed inset-0 pointer-events-none z-[-1] bg-zinc-100 dark:bg-[#070709] overflow-hidden transition-colors duration-500">

  <img src="logo-marina305.png" class="absolute inset-0 w-full h-full object-cover object-center grayscale contrast-125
              opacity-[0.08] mix-blend-multiply
              dark:opacity-[0.12] dark:invert dark:mix-blend-screen" alt="Fondo Identidad Marina 305">

  <div
    class="absolute -top-40 -right-40 w-[800px] h-[800px] bg-slate-300/20 dark:bg-zinc-900/40 rounded-full blur-[130px] mix-blend-multiply dark:mix-blend-screen">
  </div>
  <div
    class="absolute top-[25%] -left-40 w-[700px] h-[700px] bg-zinc-200/30 dark:bg-zinc-950/50 rounded-full blur-[120px] mix-blend-multiply dark:mix-blend-screen">
  </div>

  <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-zinc-100/30 dark:to-[#070709]/50">
  </div>
</div>

<div class="min-h-screen flex bg-transparent text-zinc-900 dark:text-zinc-50 font-sans">

  <aside
    class="hidden md:flex flex-col w-64 lg:w-72 bg-white/60 dark:bg-[#121216]/60 backdrop-blur-xl border-r border-zinc-200/50 dark:border-zinc-800/50 sticky top-0 h-screen p-6 shadow-xl z-30">
    <div class="mb-10 px-2">
      <h2 class="text-xl font-black tracking-wider text-zinc-900 dark:text-white uppercase">Marina <span
          class="text-amber-500">305</span></h2>
    </div>

    <div class="flex-1 space-y-2">
      <a routerLink="/cliente/home"
        routerLinkActive="bg-amber-500/10 border-amber-500 text-amber-600 dark:text-amber-500 font-bold"
        class="flex items-center gap-3 px-4 py-3 rounded-xl border-l-4 border-transparent text-zinc-600 dark:text-zinc-400 hover:bg-zinc-500/5 transition-all">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="text-sm font-medium">Inicio</span>
      </a>
      <a routerLink="/cliente/reservar"
        routerLinkActive="bg-amber-500/10 border-amber-500 text-amber-600 dark:text-amber-500 font-bold"
        class="flex items-center gap-3 px-4 py-3 rounded-xl border-l-4 border-transparent text-zinc-600 dark:text-zinc-400 hover:bg-zinc-500/5 transition-all">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <span class="text-sm font-medium">Agendar Cita</span>
      </a>
      <a routerLink="/cliente/perfil"
        routerLinkActive="bg-amber-500/10 border-amber-500 text-amber-600 dark:text-amber-500 font-bold"
        class="flex items-center gap-3 px-4 py-3 rounded-xl border-l-4 border-transparent text-zinc-600 dark:text-zinc-400 hover:bg-zinc-500/5 transition-all">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        <span class="text-sm font-medium">Mi Perfil</span>
      </a>
    </div>

    <div class="pt-4 border-t border-zinc-200/50 dark:border-zinc-800/50">
      <button (click)="confirmarLogout()"
        class="w-full flex items-center gap-3 px-4 py-3 text-zinc-500 dark:text-zinc-400 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-500/5 rounded-xl transition-all font-medium text-sm cursor-pointer text-left group">
        <svg class="w-5 h-5 transition-transform group-hover:translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <main class="flex-1 min-w-0 h-screen overflow-y-auto pb-24 md:pb-8">
    <router-outlet></router-outlet>
  </main>

  <nav
    class="md:hidden fixed bottom-0 w-full bg-white/80 dark:bg-[#121216]/80 backdrop-blur-xl border-t border-zinc-200/50 dark:border-zinc-800/50 z-50">
    <div class="flex justify-around items-center h-[68px] px-1 pb-2 pt-1">

      <a routerLink="/cliente/home" routerLinkActive="!text-amber-600 dark:!text-amber-500"
        [routerLinkActiveOptions]="{exact: true}"
        class="flex flex-col items-center justify-center w-full h-full text-zinc-400 dark:text-zinc-500 transition-all duration-300 group">
        <svg class="w-6 h-6 mb-1 transition-transform group-active:scale-90" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="text-[10px] font-semibold tracking-wide">Inicio</span>
      </a>

      <a routerLink="/cliente/reservar" routerLinkActive="!text-amber-600 dark:!text-amber-500"
        class="flex flex-col items-center justify-center w-full h-full text-zinc-400 dark:text-zinc-500 transition-all duration-300 group">
        <svg class="w-6 h-6 mb-1 transition-transform group-active:scale-90" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <span class="text-[10px] font-semibold tracking-wide">Reservas</span>
      </a>

      <a routerLink="/cliente/perfil" routerLinkActive="!text-amber-600 dark:!text-amber-500"
        class="flex flex-col items-center justify-center w-full h-full text-zinc-400 dark:text-zinc-500 transition-all duration-300 group">
        <svg class="w-6 h-6 mb-1 transition-transform group-active:scale-90" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        <span class="text-[10px] font-semibold tracking-wide">Perfil</span>
      </a>

      <button (click)="confirmarLogout()"
        class="flex flex-col items-center justify-center w-full h-full text-zinc-400 dark:text-zinc-500 hover:text-red-500 transition-all duration-300 group">
        <svg class="w-6 h-6 mb-1 transition-transform group-active:scale-90" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span class="text-[10px] font-semibold tracking-wide">Salir</span>
      </button>
    </div>
  </nav>

  <app-modal-confirm 
    [isOpen]="confirmConfig().isOpen" 
    [title]="confirmConfig().title"
    [message]="confirmConfig().message" 
    [confirmText]="confirmConfig().confirmText" 
    [type]="confirmConfig().type"
    (onConfirm)="confirmConfig().action()" 
    (onCancel)="cerrarConfirmacion()">
  </app-modal-confirm>

</div>
