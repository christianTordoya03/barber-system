<div
    class="h-screen flex bg-zinc-50 dark:bg-black text-zinc-900 dark:text-white overflow-hidden font-sans selection:bg-blue-500 selection:text-white transition-colors duration-300">

    <aside
        class="hidden md:flex flex-col w-64 bg-white dark:bg-[#111111] border-r border-zinc-200 dark:border-zinc-800 relative transition-colors duration-300">
        <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-red-600 via-gray-200 to-blue-600"></div>
        <div class="h-20 flex items-center px-6 border-b border-zinc-200 dark:border-zinc-800 mt-1">
            <img class="h-10 w-auto mr-3 object-contain invert dark:invert-0 mix-blend-multiply dark:mix-blend-lighten transition-all duration-300"
                src="logo-marina305.png" alt="Logo">
            <span class="font-bold text-lg tracking-wide text-zinc-900 dark:text-white">MARINA 305</span>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
            <a routerLink="/cliente/home" routerLinkActive="bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-white"
                class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white hover:bg-zinc-50 dark:hover:bg-zinc-800/50 transition-all">
                <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Inicio
            </a>

            <a routerLink="/cliente/reservar"
                routerLinkActive="bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-white"
                class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white hover:bg-zinc-50 dark:hover:bg-zinc-800/50 transition-all">
                <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                Agendar Cita
            </a>

            <a routerLink="/cliente/mi-perfil"
                routerLinkActive="bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-white"
                class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white hover:bg-zinc-50 dark:hover:bg-zinc-800/50 transition-all">
                <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                Mi Perfil VIP
            </a>
        </nav>

        <div class="p-4 border-t border-zinc-200 dark:border-zinc-800">
            <button (click)="confirmarLogout()"
                class="flex items-center w-full px-4 py-3 text-sm font-medium rounded-xl text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10 transition-all">
                <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">

        <header
            class="md:hidden flex items-center justify-center px-4 h-16 bg-white dark:bg-[#111111] border-b border-zinc-200 dark:border-zinc-800 shrink-0 relative z-30 transition-colors duration-300">

            <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-red-600 via-gray-200 to-blue-600 z-10"></div>

            <div class="flex items-center mt-1 z-20">
                <img class="h-8 w-auto mr-2 invert dark:invert-0 mix-blend-multiply dark:mix-blend-lighten transition-all duration-300"
                    src="logo-marina305.png" alt="Logo">
                <span class="font-bold text-base tracking-wide text-zinc-900 dark:text-white">MARINA 305</span>
            </div>

            <button (click)="confirmarLogout()"
                class="absolute right-4 top-1/2 -translate-y-1/2 mt-0.5 p-2 text-zinc-400 hover:text-red-500 active:scale-95 transition-all cursor-pointer z-40"
                title="Cerrar Sesión">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 pb-24 md:pb-8 scroll-smooth">
            <router-outlet></router-outlet>
        </div>

        <nav
            class="md:hidden fixed bottom-0 inset-x-0 bg-white/95 dark:bg-[#111111]/95 backdrop-blur-md border-t border-zinc-200 dark:border-zinc-800 flex justify-around items-center h-16 px-4 pb-safe z-40">

            <a routerLink="/cliente/home" routerLinkActive="text-zinc-900 dark:text-white"
                class="flex flex-col items-center justify-center w-full text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-colors">
                <svg class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span class="text-[10px] font-medium">Inicio</span>
            </a>

            <div class="relative w-full flex justify-center">
                <a routerLink="/cliente/reservar"
                    class="absolute -top-10 bg-gradient-to-tr from-blue-600 to-blue-400 text-white h-14 w-14 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/30 border-4 border-white dark:border-[#111111] hover:scale-105 transition-transform">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </a>
            </div>

            <a routerLink="/cliente/mi-perfil" routerLinkActive="text-zinc-900 dark:text-white"
                class="flex flex-col items-center justify-center w-full text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-colors">
                <svg class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <span class="text-[10px] font-medium">Mi VIP</span>
            </a>

        </nav>
    </main>
</div>

<app-modal-confirm [isOpen]="confirmConfig().isOpen" [title]="confirmConfig().title" [message]="confirmConfig().message"
    [type]="confirmConfig().type" [confirmText]="confirmConfig().confirmText" (onConfirm)="confirmConfig().action()"
    (onCancel)="cerrarConfirmacion()">
</app-modal-confirm>
