@if (isOpen()) {
  <div class="fixed inset-0 z-[200] flex items-center justify-center p-4 sm:p-0">
    <div class="absolute inset-0 bg-zinc-900/40 dark:bg-black/80 backdrop-blur-sm transition-opacity" (click)="onCancel.emit()"></div>
    
    <div class="relative bg-white dark:bg-[#111111] rounded-3xl border border-zinc-200 dark:border-zinc-800 w-full max-w-sm p-6 shadow-2xl text-center animate-fade-in-up transition-colors duration-300">
      
      <!-- Ícono dinámico según el 'type' -->
      <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-4"
           [ngClass]="type() === 'danger' ? 'bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400' : 'bg-blue-50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400'">
        @if (type() === 'danger') {
          <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        } @else {
          <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        }
      </div>

      <h3 class="text-xl font-bold text-zinc-900 dark:text-white mb-2">{{ title() }}</h3>
      <p class="text-sm text-zinc-500 dark:text-zinc-400 mb-8">{{ message() }}</p>

      <div class="flex space-x-3">
        <button (click)="onCancel.emit()" class="flex-1 py-3 text-sm font-bold text-zinc-600 dark:text-zinc-400 bg-zinc-100 dark:bg-zinc-900 rounded-xl hover:bg-zinc-200 dark:hover:bg-zinc-800 hover:text-zinc-900 dark:hover:text-white transition-colors">
          Cancelar
        </button>
        <button (click)="onConfirm.emit()" class="flex-1 py-3 text-sm font-bold text-white rounded-xl transition-colors shadow-md transform active:scale-95"
                [ngClass]="type() === 'danger' ? 'bg-red-600 hover:bg-red-500 shadow-red-500/30' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/30'">
          {{ confirmText() }}
        </button>
      </div>
    </div>
  </div>
}
